name: Daily AI/DX News Digest

on:
  schedule:
    # JST 05:00 = UTC 20:00 (前日)
    - cron: '0 20 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARTICLES_OUTPUT_PATH: ${{ github.workspace }}/articles.json
      ARTICLES_INPUT_PATH: ${{ github.workspace }}/articles.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/daily_digest.py

      - name: Append articles to Google Sheets
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/sheets_append.py
